name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - public/**
      - ios/**
      - index.html
      - vite.config.js
      - package.json
      - package-lock.json
      - capacitor.config.json
      - .github/workflows/ios-ipa-build.yml

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build iOS web assets
        run: npm run build:ios

      - name: Copy web assets to iOS
        run: npx cap copy ios

      - name: Build iOS app (unsigned)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA (unsigned)
        run: |
          mkdir -p ios/build/Payload
          cp -R ios/build/Build/Products/Release-iphoneos/App.app ios/build/Payload/
          cd ios/build
          /usr/bin/zip -r TheSmurf-ios-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheSmurf-ios-unsigned-ipa
          path: ios/build/TheSmurf-ios-unsigned.ipa
          if-no-files-found: error
