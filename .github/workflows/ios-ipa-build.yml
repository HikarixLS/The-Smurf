name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - public/**
      - ios/**
      - index.html
      - vite.config.js
      - package.json
      - package-lock.json
      - capacitor.config.json
      - .github/workflows/ios-ipa-build.yml

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build iOS web assets
        run: npm run build:ios

      - name: Copy web assets to iOS
        run: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -R dist/. ios/App/App/public
          cp capacitor.config.json ios/App/App/capacitor.config.json
          cat > ios/App/App/config.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <access origin="*" />
          </widget>
          EOF

      - name: Build iOS app (unsigned)
        run: xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release -sdk iphoneos -derivedDataPath ios/build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" clean build

      - name: Package IPA (unsigned)
        run: |
          mkdir -p ios/build/Payload
          cp -R ios/build/Build/Products/Release-iphoneos/App.app ios/build/Payload/
          cd ios/build
          /usr/bin/zip -r TheSmurf-ios-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheSmurf-ios-unsigned-ipa
          path: ios/build/TheSmurf-ios-unsigned.ipa
          if-no-files-found: error
